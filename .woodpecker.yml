when:
  - event: push
  - event: pull_request
  - event: tag
  - event: manual

steps:
  backend-tests:
    image: python:3.12
    when:
      - path: apps/backend/**
    commands:
      - cd apps/backend && pip install -r requirements.txt && python -m pytest --verbose

  api-tests:
    image: python:3.12
    when:
      - path: apps/api/**
    commands:
      - cd apps/api && pip install -r requirements.txt && python -m pytest --verbose

  frontend-tests:
    image: node:22
    when:
      - path: apps/frontend/**
    commands:
      - cd apps/frontend
      - npm ci
      - npm test

  docker-build-backend:
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
        branch: main
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-backend
      dockerfile: apps/backend/Dockerfile
      context: apps/backend
      tags: latest
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD

  docker-build-api:
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
        branch: main
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-api
      dockerfile: apps/api/Dockerfile
      context: apps/api
      tags: latest
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD

  docker-build-frontend:
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
        branch: main
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO_OWNER}/${CI_REPO_NAME}-frontend
      dockerfile: apps/frontend/Dockerfile
      context: apps/frontend
      tags: latest
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD

  deploy-dev:
    image: appleboy/drone-ssh
    when:
      - event: push
        branch: main
    settings:
      host:
        from_secret: DEV_SERVER_HOST
      username:
        from_secret: DEV_SERVER_USER
      key:
        from_secret: DEV_SERVER_SSH_KEY
      script:
        - mkdir -p /opt/${CI_REPO_NAME}
        - cd /opt/${CI_REPO_NAME}
        - curl -o docker-compose.yml https://raw.githubusercontent.com/${CI_REPO_OWNER}/${CI_REPO_NAME}/main/deploy/docker-compose.yml
        - curl -o .env https://raw.githubusercontent.com/${CI_REPO_OWNER}/${CI_REPO_NAME}/main/deploy/.env.example
        - docker compose pull
        - docker compose up -d --remove-orphans
