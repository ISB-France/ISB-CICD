services:
  backend:
    image: ghcr.io/${GITHUB_OWNER}/${REPO_NAME}-backend:latest
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-dev}
    networks:
      - app-net

  api:
    image: ghcr.io/${GITHUB_OWNER}/${REPO_NAME}-api:latest
    container_name: api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - APP_ENV=${APP_ENV:-dev}
    networks:
      - app-net

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/${REPO_NAME}-frontend:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
